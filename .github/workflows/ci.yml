name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Check FastAPI backend syntax
        working-directory: lumora-web/backend
        run: uv run python -m py_compile main.py

      - name: Check Hugging Face Space syntax
        working-directory: lumora-web/backend/lumora
        run: uv run python -m py_compile main.py

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lumora-web/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_BASE_URL: http://localhost:8000
        run: bun run build
