name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "lumora-web/backend/**"
      - ".github/workflows/deploy-hf-space.yml"
  workflow_dispatch:

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Compile Space app
        working-directory: lumora-web/backend
        run: uv run python -m py_compile main.py

  deploy:
    name: Sync Docker Space
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync Space files to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ${{ vars.HF_SPACE_ID }}
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: lumora-web/backend
